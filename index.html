<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Raw .user.js Server</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            background: #0a0a0a;
            color: #0f0;
            padding: 40px;
            margin: 0;
            text-align: center;
        }
        h1 { font-size: 2.2rem; margin-bottom: 10px; }

    <h1>Raw .user.js Server</h1>

    <p><strong>Example:</strong> /raw/example.user.js</p>
</body>
